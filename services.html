<!DOCTYPE html>
<html>
<head>
<title>Services</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

<style>
/* ===== SERVICES GRID ===== */
.services-grid{
display:grid;
grid-template-columns: repeat(4, 1fr);
gap:16px;
}

@media (max-width:992px){
.services-grid{ grid-template-columns: repeat(3, 1fr); }
}

@media (max-width:600px){
.services-grid{ grid-template-columns: repeat(2, 1fr); }
}

@media (max-width:380px){
.services-grid{ grid-template-columns: 1fr; }
}

.service-card{
position:relative;
cursor:pointer;
overflow:hidden;
border-radius:8px;
}

.service-card img{
width:100%;
height:auto;
display:block;
border-radius:8px;
transition: transform 0.3s ease;
}

.service-card:hover img{
transform: scale(1.05);
}

/* Overlay "Tap to View" */
.service-card::after{
content:"Tap to View";
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:white;
padding:6px 12px;
border-radius:6px;
font-size:14px;
opacity:0;
transition: opacity 0.3s ease;
}

.service-card:hover::after{
opacity:1;
}

/* ===== CONTACT BUTTON ===== */
.contact-section{
text-align:center;
margin:40px 0;
padding:0 10px;
}

.contact-btn{
background:#0b3d91;
color:white;
border:none;
padding:14px 28px;
font-size:18px;
border-radius:8px;
cursor:pointer;
width:100%;
max-width:320px;
}

.contact-btn:hover{
background:#082c6c;
}

/* ===== DARK BLUE MODAL ===== */
.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
padding:12px;
overflow:auto;
}

.modal form{
background:#0b3d91;
color:white;
padding:20px;
width:100%;
max-width:340px;
margin:60px auto;
display:flex;
flex-direction:column;
gap:12px;
border-radius:10px;
}

.modal input,
.modal select{
padding:10px;
border:none;
border-radius:6px;
width:100%;
}

.modal button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.modal button[type="submit"]{
background:white;
color:#0b3d91;
}

.cancel-btn{
background:#082c6c;
color:white;
}

/* ===== RESPONSIVE FOOTER ===== */
.footer{
background:black;
color:white;
padding:20px 10px;
text-align:center;
}

.footer-content{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
font-size:14px;
}

@media (max-width:600px){
.footer-content{
flex-direction:column;
gap:8px;
font-size:13px;
}
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="w3-top">
<div class="w3-bar w3-white w3-wide w3-padding w3-card">
<a href="#home" class="w3-bar-item w3-button"><b>Anveshan</b></a>
</div>
</div>

<!-- Header -->
<header class="w3-display-container w3-content w3-wide" style="max-width:1500px;" id="home">
<img class="w3-image" src="bannnn.jpg" width="1500" height="400">
<div class="w3-display-middle w3-margin-top w3-center">
<h1 class="w3-xxlarge w3-text-white"><b>Our Services</b></h1>
</div>
</header>

<div class="w3-content w3-padding" style="max-width:1564px">

<!-- SERVICES -->
<div id="servicesContainer" class="services-grid"></div>

<!-- CONTACT BUTTON -->
<div class="contact-section">
<button class="contact-btn" id="openContact">Contact Now</button>
</div>

</div>

<!-- IMAGE MODAL -->
<div id="designModal" class="w3-modal" onclick="this.style.display='none'">
<div class="w3-modal-content w3-animate-zoom w3-center w3-padding">
<img id="modalImage" style="width:100%">
</div>
</div>

<!-- CONTACT MODAL -->
<div id="orderModal" class="modal">
<form id="orderForm">
<h3>Contact </h3>

<input name="name" placeholder="Your Name" required>
<input name="email" type="email" placeholder="Your Email" required>

<select name="service" required>
<option value="Banner Design">Banner Design</option>
<option value="Frontend Web Development">Frontend Web Development</option>
<option value="Backend Web Development">Backend Web Development</option>
<option value="Logo Design">Logo Design</option>
<option value="Document Editing">Document Editing</option>
<option value="CV Design and Editing">CV Design and Editing</option>
<option value="Graphics Designs">Graphics Designs</option>
<option value="Other Services">Other Services</option>
</select>

<input name="contact" placeholder="Contact" required>

<button type="submit">Contact Now</button>
<button type="button" class="cancel-btn" id="closeModal">Cancel</button>
</form>
</div>

<!-- FOOTER -->
<footer class="footer">
<div class="footer-content">
<span>© 2025 Anveshan</span>
<span>All Rights Reserved</span>

</div>
</footer>

<script>
const servicesData = [
{ img:"banner.jpeg" },
{ img:"logo.jpeg" },
{ img:"frontend.jpg" },
{ img:"bakend.jpg" },
{ img:"documents.jpg" },
{ img:"cv.jpg" },
{ img:"graphics.jpg" },
{ img:"other.jpg" }
];

const container = document.getElementById("servicesContainer");

servicesData.forEach(service=>{
const card = document.createElement("div");
card.className="service-card";
card.innerHTML=`<img src="${service.img}">`;
card.onclick=()=>{
document.getElementById("modalImage").src=service.img;
document.getElementById("designModal").style.display="block";
};
container.appendChild(card);
});

const orderModal = document.getElementById("orderModal");
document.getElementById("openContact").onclick=()=>orderModal.style.display="block";
document.getElementById("closeModal").onclick=()=>orderModal.style.display="none";

/* FORM → FORMSPREE → WHATSAPP */
const form = document.getElementById("orderForm");
form.addEventListener("submit", async function(e){
e.preventDefault();
const formData = new FormData(form);
try{
await fetch("https://formspree.io/f/YOUR_FORMSPREE_ID", {
method: "POST",
body: formData,
headers: { 'Accept': 'application/json' }
});
const name = formData.get("name");
const service = formData.get("service");
const message = encodeURIComponent(`Hello, my name is ${name}. I want ${service}.`);
window.location.href = `https://wa.me/9779761120781?text=${message}`;
}catch(error){
alert("Submission failed. Try again.");
}
});
</script>

</body>
</html>
